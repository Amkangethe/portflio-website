<!DOCTYPE html>
<html>
    <head>
		<title>Allan Kangethe</title>
		<link rel="stylesheet" href="./styles/index.css">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

    </head>
    <body class="page">
		<div class="header">
			<div class="menu-bar">
				<a href="https://www.allankangethe.com" class="menu-item">
					<img class="home-icon" src="icons/home.png">
				</a>
				<a href="Allan_Kangethe_Resume.pdf" class="menu-item" target="_parent" rel="noopener noreferrer">
					<img class="cv-icon" src="icons/cv.png">
				</a>
				
			</div>
		</div>

		<div class="profile-hero">
			<div class="profile-hero-info">
				<p class="profile-hero-name">Allan Kangethe</p>
				<p class="profile-hero-subtitle">B.S.</p>
				<p class="profile-hero-role">Gradute Student</p>
			</div>
			<div>
				<video id="profileVideo" autoplay muted playsinline loop preload="auto" class="rounded-video">
					<source src="./videos/profile-hero-video-small.mp4" type="video/mp4">
				</video>
			</div>
		</div>

		<div class="links">
				<a href="https://github.com/Amkangethe" target="_blank">
					<img class="github-icon" src="icons/github.png">
				</a>
				<a href="https://www.linkedin.com/in/allankangethe/" target="_blank">
					<img class="linkedin-icon" src="icons/linkedin.png">
				</a>
				
		</div>

		<!--<video autoplay muted playsinline class="rounded-video">
					<source src="IMG_8812.mov" type="video/mp4">
					Your browser does not support the video tag.
		</video>
	-->

	<script>
		const video = document.getElementById("profileVideo");

		video.muted = true;
		video.defaultMuted = true;
		video.playsInline = true;

		const tryPlay = () => {
			const p = video.play();
			if (p !== undefined) {
			p.catch(() => {});
			}
		};

		window.addEventListener("load", tryPlay);
		document.addEventListener("visibilitychange", () => {
			if (!document.hidden) tryPlay();
		});
	</script>
			
    </body>
</html>
