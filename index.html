<!DOCTYPE html>
<html>
    <head>
		<title>Allan Kangethe</title>
		<link rel="stylesheet" href="./styles/root.css">
		<link rel="stylesheet" href="./styles/header.css">
		<link rel="stylesheet" href="./styles/section-1/section-1.css">
		<link rel="stylesheet" href="./styles/section-1/profile.css">
		
		
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

    </head>
    <body>
		<!-- Section 1-->
		<section class="section-1">
			<div class="section-1-bg" aria-hidden="true"></div>
			
			<!-- Header -->
			<div class="header">
				<a href="#top" class="header-logo">Allan Kangethe</a>
				<div class="menu">
					<a class="menu-item"></a>
					<a class="menu-item"></a>
					<a class="menu-item"></a>
					<a class="menu-item"></a>
					<button id="themeToggle">
						<img id="themeIcon" class="theme" src="./icons/sun.png" alt="" />
					</button>
				</div>
			</div>

			<!-- Profile Card -->
			<div class="profile-hero reveal d1">
				<div class="profile-hero-info">
					<p class="profile-hero-name">Allan Kangethe</p>
					<p class="profile-hero-title">Graduate Student</p>
					<p class="profile-hero-role">AI/ML & Software Engineering</p>

				</div>
				<div class="profile-video">
					<div class="profile-video-outer-circle">
						<div class="profile-video-element">
							<video autoplay muted playsinline preload="auto" class="profile-hero-video">
								<source src="./videos/profile-hero-video-small.mp4" type="video/mp4">
							</video>
						</div>

					</div>			

				</div>

			</div>

			<div class="external-links reveal d3">
				<a href="https://github.com/Amkangethe" target="_blank">
					<img class="profile-icon" src="icons/github.png">
				</a>
				<a href="https://www.linkedin.com/in/allankangethe/" target="_blank">
					<img class="profile-icon" src="icons/linkedin.png">
				</a>

			</div>

			
		</section>

		<main class="page">
			<!-- everything else -->
		</main>

		<script>
			const root = document.documentElement;
			
			const btn = document.getElementById("themeToggle");
			const icon = document.getElementById("themeIcon");

			const ICON_LIGHT = "./icons/sun.png";   // shown when theme is light
			const ICON_DARK  = "./icons/moon.png";  // shown when theme is dark

			const setIcon = () => {
				const isDark = root.dataset.theme === "dark";
				icon.src = isDark ? ICON_DARK : ICON_LIGHT; // click shows opposite action
			};

			btn.onclick = () => {
				root.dataset.theme = root.dataset.theme === "dark" ? "light" : "dark";
				setIcon();
			};

			// set correct icon on initial load (if you set data-theme in HTML/CSS)
			setIcon();
		</script>
		
</body>
</html>
